# --- Project ---
sonar.projectKey=orquestra-backend
sonar.projectName=Orquestra Backend
sonar.projectVersion=1.0

# --- Server ---
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}

# --- Source code ---
sonar.sources=app,main.py
sonar.sourceEncoding=UTF-8

# --- Tests ---
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# --- Exclusions ---
sonar.exclusions=**/.venv/**,**/__pycache__/**,**/*.pyc,**/migrations/**,**/.pytest_cache/**,**/.coverage,coverage.xml

# --- Coverage ---
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=tests/**,**/__init__.py,seed.py,init_db.py,app/models/base.py,**/models/base.py

# --- Python ---
sonar.python.version=3.11