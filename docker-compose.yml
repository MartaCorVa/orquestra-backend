services:
  db:
    image: postgres:15
    container_name: orquestra_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orquestra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orquestra_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: orquestra_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - ./.env

volumes:
  postgres_data: